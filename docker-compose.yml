services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    hostname: postgres
    restart: unless-stopped
    networks:
      - n8n_network
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_storage:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  n8n-import:
    image: n8nio/n8n:latest
    container_name: n8n-import
    hostname: n8n-import
    restart: "no"
    networks:
      - n8n_network
    env_file:
      - .env
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_USER_MANAGEMENT_JWT_SECRET: ${N8N_USER_MANAGEMENT_JWT_SECRET}
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
      N8N_COMMUNITY_PACKAGES_ALLOW_TOOL_USAGE: "true"
      N8N_DEFAULT_BINARY_DATA_MODE: ${N8N_DEFAULT_BINARY_DATA_MODE}
      WEBHOOK_URL: ${WEBHOOK_URL}
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL}
      N8N_HOST: ${N8N_HOST}
      N8N_PORT: ${N8N_PORT}
      N8N_PROTOCOL: ${N8N_PROTOCOL}
      N8N_PROXY_HOPS: ${N8N_PROXY_HOPS}
      NODE_ENV: ${NODE_ENV}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE}
      OLLAMA_HOST: ${OLLAMA_HOST}
      CRAWL4AI_HOST: ${CRAWL4AI_HOST}
      BROWSERLESS_URL: ${BROWSERLESS_URL}
      QDRANT_URL: ${QDRANT_URL}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_PORT: ${MINIO_PORT}
      HTTP_PROXY: ${HTTP_PROXY}
      HTTPS_PROXY: ${HTTPS_PROXY}
      NO_PROXY: ${NO_PROXY}
    entrypoint: /bin/sh
    command:
      - -c
      - |
        if [ -d /demo-data/credentials ] && [ "$(ls -A /demo-data/credentials 2>/dev/null)" ]; then
          n8n import:credentials --separate --input=/demo-data/credentials;
        fi
        if [ -d /demo-data/workflows ] && [ "$(ls -A /demo-data/workflows 2>/dev/null)" ]; then
          n8n import:workflow --separate --input=/demo-data/workflows;
        fi
    volumes:
      - ./n8n/demo-data:/demo-data
    depends_on:
      postgres:
        condition: service_healthy

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    hostname: n8n
    restart: unless-stopped
    networks:
      - n8n_network
    ports:
      - "5678:5678"
    env_file:
      - .env
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_USER_MANAGEMENT_JWT_SECRET: ${N8N_USER_MANAGEMENT_JWT_SECRET}
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
      N8N_COMMUNITY_PACKAGES_ALLOW_TOOL_USAGE: "true"
      N8N_DEFAULT_BINARY_DATA_MODE: ${N8N_DEFAULT_BINARY_DATA_MODE}
      WEBHOOK_URL: ${WEBHOOK_URL}
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL}
      N8N_HOST: ${N8N_HOST}
      N8N_PORT: ${N8N_PORT}
      N8N_PROTOCOL: ${N8N_PROTOCOL}
      N8N_PROXY_HOPS: ${N8N_PROXY_HOPS}
      NODE_ENV: ${NODE_ENV}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE}
      OLLAMA_HOST: ${OLLAMA_HOST}
      CRAWL4AI_HOST: ${CRAWL4AI_HOST}
      BROWSERLESS_URL: ${BROWSERLESS_URL}
      QDRANT_URL: ${QDRANT_URL}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_PORT: ${MINIO_PORT}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      HTTP_PROXY: ${HTTP_PROXY}
      HTTPS_PROXY: ${HTTPS_PROXY}
      NO_PROXY: ${NO_PROXY}
    volumes:
      - n8n_storage:/home/node/.n8n
      - ./n8n/demo-data:/demo-data
      - ./shared:/data/shared
    depends_on:
      postgres:
        condition: service_healthy
      n8n-import:
        condition: service_completed_successfully
      qdrant:
        condition: service_started
      crawl4ai:
        condition: service_healthy
      browserless:
        condition: service_started
      minio:
        condition: service_started
      squid:
        condition: service_started

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    hostname: qdrant
    restart: unless-stopped
    networks:
      - n8n_network
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    hostname: ollama
    restart: unless-stopped
    networks:
      - n8n_network
    ports:
      - "11434:11434"
    volumes:
      - ollama_storage:/root/.ollama

  ollama-pull-llama:
    image: ollama/ollama:latest
    container_name: ollama-pull-llama
    hostname: ollama-pull-llama
    restart: "no"
    networks:
      - n8n_network
    entrypoint: /bin/sh
    environment:
      OLLAMA_HOST: ollama:11434
    command:
      - -c
      - |
        sleep 8
        ollama pull llama3.2
    volumes:
      - ollama_storage:/root/.ollama
    depends_on:
      ollama:
        condition: service_started

  crawl4ai:
    image: unclecode/crawl4ai:latest
    container_name: crawl4ai
    hostname: crawl4ai
    restart: unless-stopped
    networks:
      - n8n_network
    ports:
      - "11235:11235"
    shm_size: "3gb"
    volumes:
      - crawl4ai_storage:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:11235/health >/dev/null 2>&1 || curl -fsS http://localhost:11235/health >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 10

  squid:
    image: ubuntu/squid:latest
    container_name: squid
    hostname: squid
    restart: unless-stopped
    networks:
      - n8n_network
    ports:
      - "3128:3128"
    volumes:
      - squid_storage:/var/spool/squid

  browserless:
    image: ghcr.io/browserless/chromium:latest
    container_name: browserless
    hostname: browserless
    restart: unless-stopped
    networks:
      - n8n_network
    ports:
      - "3000:3000"
    environment:
      TOKEN: ${BROWSERLESS_TOKEN}
      CONCURRENT: 5
      TIMEOUT: 120000
      HEALTH: "true"
      HTTP_PROXY: ${HTTP_PROXY}
      HTTPS_PROXY: ${HTTPS_PROXY}
      NO_PROXY: ${NO_PROXY}
    depends_on:
      squid:
        condition: service_started

  minio:
    image: quay.io/minio/minio:latest
    container_name: minio
    hostname: minio
    restart: unless-stopped
    networks:
      - n8n_network
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_storage:/data

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TOKEN}
    networks:
      - n8n_network
    depends_on:
      n8n:
        condition: service_started

volumes:
  n8n_storage:
  postgres_storage:
  ollama_storage:
  qdrant_storage:
  crawl4ai_storage:
  squid_storage:
  minio_storage:

networks:
  n8n_network:
    driver: bridge
